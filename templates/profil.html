<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Můj profil</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 500px; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #007bff; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        tr:hover { background: #f5f5f5; }
        .zpet-btn { background: #6c757d; color: white; text-decoration: none; padding: 10px 20px; border-radius: 5px; display: inline-block; margin-top: 20px; }
        .udaje { background: #f8f9fa; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .udaje p { margin: 5px 0; }
    </style>
</head>
<body>
<div class="box">
    <h1>Můj profil</h1>

    <!-- Osobní údaje -->
    <div class="udaje">
        <p><strong>Jméno:</strong> {{ udaje[0] }}</p>
        <p><strong>Email:</strong> {{ udaje[1] }}</p>
        <p><strong>Věk:</strong> {{ udaje[2] }} let</p>
    </div>

    <!-- Historie přihlášení -->
    <h2>Moje historie</h2>
    <table>
        <tr>
            <th>Akce</th>
            <th>Čas</th>
        </tr>
        {% for zaznam in historie %}
        <tr>
            <td>{{ zaznam[0] }}</td>
            <td>{{ zaznam[1] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/" class="zpet-btn">← Zpět</a>
</div>
</body>
</html>
